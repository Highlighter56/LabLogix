<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room259</title>
    <link rel="stylesheet" href="/259Style.css">
</head>

<body class="room259">

    <h1>LabLogix</h1>

    <img src="../images/room259.jpeg" alt="room259 background">

    <div class="form-box">

        <form>
            <div class="buttons">
                <button type="button" onclick="window.location.href='/home'">Home</button>
                <button type="button" onclick="window.location.href='/room259'">Room 259</button>
                <button type="button" onclick="window.location.href='/room260'">Room 260</button>
            </div>

            <h2>Room259</h2>

            <!--Separate the content into two columns-->
            <div class="columns">

                <!--Left column-->
                <div id="left-column">

                    <!--Displays the status of room259-->
                    <div id="room259-status">Room Status: Loading...</div>

                    <!--Displays the current occupancy of room259-->
                    <div id="room259-occupancy">Occupancy: Loading...</div>

                    <!--Displays notification-driven room alerts-->
                    <div id="room259-alerts">Room Alerts: Loading...</div>
                </div>

                <!--Right column-->
                <div class="right-column">
                    <!--Displays which and how many devices are in use in room259-->
                    <h3>Devices in use:</h3>
                    <ul id="room259-devices"></ul>
                </div>
            </div>

            <!--Displays peak usage & least usage time as a chart-->
            <div class="chart-wrapper">
                <canvas id="usageTimeChart"></canvas>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

            <script>
                function notificationStatusToLabel(notificationRows, fallbackRoomStatus) {
                    const activeIds = new Set(
                        (notificationRows || [])
                            .filter(row => Number(row.status) === 1 || row.status === true)
                            .map(row => Number(row.notificationID))
                    );

                    if (activeIds.has(1)) return 'closed';
                    if (activeIds.has(3)) return 'full';
                    if (activeIds.has(2) || activeIds.has(4)) return 'open';
                    return fallbackRoomStatus || 'unknown';
                }

                function formatHourLabel(hour24) {
                    const h = Number(hour24);
                    const hour12 = h % 12 || 12;
                    const suffix = h >= 12 ? 'PM' : 'AM';
                    return `${hour12}:00 ${suffix}`;
                }

                function getRoomOpenStatusByTime() {
                    const now = new Date();
                    const hour = now.getHours();
                    // Room open 8am (8) to 8pm (20), closed otherwise
                    return hour >= 8 && hour < 20 ? 'open' : 'closed';
                }

                async function loadRoom259Summary() {
                    try {
                        const [roomResponse, notificationsResponse] = await Promise.all([
                            fetch('/api/room259-current'),
                            fetch('/api/notificationTable')
                        ]);

                        const room = await roomResponse.json();
                        const notifications = await notificationsResponse.json();

                        // Primary: use time-based open/closed logic
                        let roomStatus = getRoomOpenStatusByTime();
                        
                        // Secondary: check if capacity is full (overrides to 'full' if so)
                        const activeIds = new Set(
                            (notifications || [])
                                .filter(row => Number(row.status) === 1 || row.status === true)
                                .map(row => Number(row.notificationID))
                        );
                        if (activeIds.has(3)) {
                            roomStatus = 'full';
                        }
                        const statusContainer = document.getElementById('room259-status');
                        const occupancyContainer = document.getElementById('room259-occupancy');
                        const alertsContainer = document.getElementById('room259-alerts');

                        statusContainer.innerText = `Room Status: ${roomStatus}`;

                        if (room) {
                            occupancyContainer.innerText = `Occupancy: ${room.currentOccupancy} / ${room.capacity}`;
                        } else {
                            occupancyContainer.innerText = 'Occupancy: No room data';
                        }

                        const notificationLabels = {
                            1: 'Room Closed (8:00 PM)',
                            2: 'Room Open (8:00 AM)',
                            3: 'Room Capacity Reached (30)',
                            4: 'Spot Opened (29)'
                        };

                        const activeAlerts = (notifications || [])
                            .filter(row => Number(row.status) === 1 || row.status === true)
                            .map(row => notificationLabels[Number(row.notificationID)] || `Notification ${row.notificationID}`);

                        alertsContainer.innerText = activeAlerts.length
                            ? `Room Alerts: ${activeAlerts.join(' | ')}`
                            : 'Room Alerts: None active';
                    } catch (err) {
                        console.error(err);
                        document.getElementById('room259-status').innerText = 'Room Status: Unavailable';
                        document.getElementById('room259-occupancy').innerText = 'Occupancy: Unavailable';
                        document.getElementById('room259-alerts').innerText = 'Room Alerts: Unavailable';
                    }
                }

                async function loadRoom259Devices() {
                    try {
                        const response = await fetch('/api/room259-devices');
                        const data = await response.json();
                        const container = document.getElementById('room259-devices');
                        container.innerHTML = '';
                        container.style.columnCount = '2';
                        container.style.columnGap = '24px';
                        container.style.paddingLeft = '20px';

                        data.forEach(device => {
                            const li = document.createElement('li');
                            li.style.breakInside = 'avoid';
                            li.style.whiteSpace = 'nowrap';
                            li.style.marginBottom = '8px';
                            const statusLabel = String(device.status).replace('_', ' ');
                            li.textContent = `${device.deviceType} ${device.deviceId}: ${statusLabel}`;
                            container.appendChild(li);
                        });
                    } catch (err) {
                        console.error(err);
                    }
                }

                async function usageTime259() {
                    const response = await fetch('/api/room259-usageTime');
                    const data = await response.json();

                    const hours = data.map(row => formatHourLabel(row.hour));
                    const sessions = data.map(row => row.sessions);

                    const ctx = document.getElementById('usageTimeChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: hours,
                            datasets: [{
                                label: 'Session Count per Hour',
                                data: sessions,
                                backgroundColor: sessions.map(s =>
                                    s > 20 ? '#ef4444' :  // busy: red
                                    s > 10 ? '#f97316' :  // moderate: orange
                                    '#22c55e'             // quit: green
                                ),
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#FFFFFF'
                                    }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: (context) => {
                                            const val = context.raw;
                                            const label = val > 20 ? 'Very Busy' : val > 10 ? 'Moderate' : 'Quiet';
                                            return `${val} sessions - ${label}`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    title: {
                                        display: true,
                                        text: 'Time of Day',
                                        color: '#FFFFFF'
                                    },
                                    ticks: {
                                        color: '#FFFFFF'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.2)'
                                    }
                                },
                                y: {
                                    title: {
                                        display: true,
                                        text: 'Session Count',
                                        color: '#FFFFFF'
                                    },
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#FFFFFF',
                                        precision: 0
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.2)'
                                    }
                                }
                            }
                        }
                    });
                }
                loadRoom259Summary();
                loadRoom259Devices();
                usageTime259();
            </script>
        </form>
    </div>
</body>
</html>
